<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca CEP</title>
    <link rel="stylesheet" href="/styles/style.css">
    <script defer src="/scripts/script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Buscar Endereço pelo Codigo do produto</h1>
        <label for="codigo">Codigo:</label>
        <input type="text" id="codigo" placeholder="Digite o codigo">
        <button id="botao-buscar">Buscar</button>
        <form class="formulario">
            <label for="prod-nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite o nome do produto">
            <label for="preco">Preço:</label>
            <input type="text" id="preco" placeholder="Digite o valor">
            <label for="categoria">Categoria:</label>
            <input type="text" id="categoria" placeholder="Digite a categoria">

        </form>
    </div>
</body>
</html>
